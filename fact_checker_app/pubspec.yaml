name: fact_checker_app
description: Advanced Fact-Checking Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI Components
  cupertino_icons: ^1.0.6
  
  # HTTP & Networking
  http: ^1.1.0
  
  # Image Handling
  image_picker: ^1.0.4
  
  # Charts
  fl_chart: ^0.65.0
  
  # URL Launcher
  url_launcher: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  # If you want to add custom fonts or assets, uncomment and configure:
  # assets:
  #   - assets/images/
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: fonts/CustomFont-Regular.ttf